<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./app.css">
    <link rel="stylesheet" type="text/css" href="./responsive.css">
    <script src="/config.js" defer></script>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.js" defer></script>
    <script type="text/javascript" src="./main.js" defer></script>
    <script type="text/javascript" src="./drop.js" defer></script>
    <script type="text/javascript" src="./email.js" defer></script>

    <title>Document</title>
</head>

<body>

    <header class="titulo1">
        <!-- <h1>Contactame</h1> -->
        <ul class="menu">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>

    </header>

    <main class="layout">

        <section class="caja_formulario">

            <form id="formCorreo" enctype="multipart/form-data">

                <!--<label for="">Id</label>
                <input type="text" id="identificador">-->

                <label for="">Nombre</label>
                <input type="text" name="nombre" id="nombre">


                <label for="">correo</label>
                <input type="email" name="correo" id="email">


                <label for="">Comentarios</label>
                <textarea name="comentarios" id="comentarios"></textarea>

                <label for="drop-zone">Archivos (PDF/XML)</label>
                <div id="drop-zone" class="drop-zone" tabindex="0">
                    Arrastra aquí o haz clic para seleccionar archivos PDF/XML.
                    <input id="file-input" name="archivos" type="file" accept=".pdf,.xml" multiple hidden>
                </div>
                <ul id="file-list" class="file-list"></ul>


                <!--<button type="submit">Enviar</button>-->
                <!--<button type="button" id="clear-all">Eliminar todos archivos</button>-->
            </form>
        </section>

    </main>


    <div class="modal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Modal title</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <p>Modal body text goes here.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary">Save changes</button>
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>


    <aside class="Area_de_botones">

        <div class="caja_botones">



            <button class="botones_db" id="BTN_agregar">Agregar</button>
            <button class="botones_db" id="BTN_consultar">Consultar</button>
            <button class="botones_db" id="BTN_actualizar">Actualizar</button>
            <button class="botones_db" id="BTN_eliminar">Eliminar</button>


            <button class="botones_db" type="submit" id="envio">Enviar Archivos</button>
            <button class="botones_db" type="button" id="clear-all">Eliminar todos archivos</button>



        </div>

    </aside>


    <footer>
        <div class="pie_pagina">
            <p>Contacto: info@ejemplo.com</p>
            <p>Teléfono: +1 234 567 890</p>
            <p>Derechos reservados &copy; 2024</p>


        </div>
    </footer>

</body>
