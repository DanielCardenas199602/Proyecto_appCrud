<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="./app.css">
    <link rel="stylesheet" type="text/css" href="./responsive.css">
    <script src="/config.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="text/javascript" src="./main.js" defer></script>
    <script type="text/javascript" src="./drop.js" defer></script>
    <script type="text/javascript" src="./email.js" defer></script>

    <title>Document</title>
</head>

<body>

    <header class="titulo1">
        <h2>Bienvenido al panel</h2>
        <ul class="menu">
            <li><a href="#">Inicio</a></li>

        </ul>

    </header>

    <main class="layout">

        <section class="caja_formulario">

            <form id="formCorreo" enctype="multipart/form-data">

                <!--<label for="">Id</label>
                <input type="text" id="identificador">-->

                <label for="">Nombre</label>
                <input type="text" name="nombre" id="nombre">


                <label for="">correo</label>
                <input type="email" name="correo" id="email">


                <label for="">Comentarios</label>
                <textarea name="comentarios" id="comentarios"></textarea>

                <label for="drop-zone">Archivos (PDF/XML)</label>
                <div id="drop-zone" class="drop-zone" tabindex="0">
                    Arrastra aquí o haz clic para seleccionar archivos PDF/XML.
                    <input id="file-input" name="archivos" type="file" accept=".pdf,.xml" multiple hidden>
                </div>
                <ul id="file-list" class="file-list"></ul>


                <!--<button type="submit">Enviar</button>-->
                <!--<button type="button" id="clear-all">Eliminar todos archivos</button>-->
            </form>
        </section>

    </main>





    <aside class="Area_de_botones">

        <div class="caja_botones">



            <button class="botones_db" id="BTN_agregar">Agregar</button>
            <button class="botones_db" id="BTN_consultar">Consultar</button>
            <button class="botones_db" id="BTN_actualizar">Actualizar</button>
            <button class="botones_db" id="BTN_eliminar">Eliminar</button>



            <button class="botones_db" type="submit" id="envio">Enviar Archivos</button>
            <button class="botones_db" type="button" id="clear-all">Eliminar todos archivos</button>
            <button type="button" class="botones_db  class=" btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                Registro de envios
            </button>



        </div>

    </aside>


    <!-- Button trigger modal -->


    <!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background-color: #688291; color: white;">
                <h5 class="modal-title" id="exampleModalLabel">📋 Registro de Envíos</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <table class="table table-striped table-hover">
                    <thead style="background-color: #688291; color: white;">
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Archivos Enviados</th>
                            <th>Fecha</th>
                            <th>Eliminar</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-registros">
                        <tr>
                            <td colspan="6" class="text-center text-muted">No hay registros aún</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" id="btn-eliminar-todos" style="background-color: #c0392b; color: white;">🗑️ Eliminar todos</button>
                <button type="button" class="btn" style="background-color: #688291; color: white;" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>


    <footer>
        <div class="pie_pagina">
            <p>Contacto: info@ejemplo.com</p>
            <p>Teléfono: +1 234 567 890</p>
            <p>Derechos reservados &copy; 2024</p>


        </div>
    </footer>

</body>
